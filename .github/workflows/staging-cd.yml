# Validates that staging-oriented images build on every push to main.
# Wire registry push and host deploy in your environment when a target is available.

name: Staging CD (build)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-staging-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build staging compose images
        run: docker compose -f docker-compose.staging.yml build
